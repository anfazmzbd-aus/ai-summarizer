<!DOCTYPE html>
<html>
<head>
    <title>History</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

    <h1>Summary History</h1>

    {% for item in summaries %}

        <div class="result-box">

            <strong>Original:</strong>

            <p>
                {{ item.original_text[:150] }}
            </p>

            <strong>Summary:</strong>

            <p>
                {{ item.summary }}
            </p>

        </div>

        <br>

    {% endfor %}
    <br><br>

    <a href="/">← Back</a>
</div>

</body>
</html>
